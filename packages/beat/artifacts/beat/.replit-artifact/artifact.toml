kind = "web"
previewPath = "/"
title = "Beat — Detective Field Kit"
version = "1.0.0"
id = "artifacts/beat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25620

[services.development]
run = "pnpm --filter @workspace/beat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beat", "run", "build" ]
publicDir = "artifacts/beat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25620"
BASE_PATH = "/"
